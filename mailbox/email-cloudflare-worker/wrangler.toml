"$schema" = "./node_modules/wrangler/config-schema.json"
name = "email-cloudflare-worker"
main = "src/index.ts"
compatibility_date = "2026-05-08"

[secrets]
required = [ "SUPABASE_URL", "SUPABASE_SECRET_KEY", "MASTER_GMAIL" ]

[[send_email]]
name = "EMAIL"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
